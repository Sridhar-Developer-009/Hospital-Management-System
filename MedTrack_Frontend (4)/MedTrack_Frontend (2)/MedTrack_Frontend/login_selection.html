<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - CityCare Hospital</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="assets/css/global.css">
  
  <style>
    body {
      background: var(--bg-neutral);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    /* Simplified Navbar */
    #navbar-header {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--light-border);
      position: sticky;
      top: 0;
      z-index: 100;
      height: 64px;
      display: flex;
      align-items: center;
    }
    
    .nav-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }
    
    .brand-logo-panel {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }
    
    /* Main Content */
    .selection-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
    }
    
    .filter-card {
      background: #ffffff;
      border: 1px solid var(--light-border);
      border-radius: var(--radius-lg);
      padding: 48px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.06);
      text-align: center;
    }
    
    .filter-card-title {
      font-family: var(--font-serif);
      font-size: 2.2rem;
      color: var(--primary-brand);
      margin-bottom: 12px;
    }
    
    .filter-card-subtitle {
      color: var(--muted-text);
      font-size: 0.95rem;
      margin-bottom: 32px;
      line-height: 1.5;
    }
    
    .role-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    
    .role-option {
      display: flex;
      align-items: center;
      padding: 16px 20px;
      background: var(--bg-neutral);
      border: 1px solid var(--light-border);
      border-radius: var(--radius-md);
      text-decoration: none;
      color: var(--dark-text);
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }
    
    .role-option:hover {
      border-color: var(--primary-brand);
      background: #f0fdf4; /* Very light green tint */
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(11, 92, 62, 0.08);
    }
    
    .role-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    
    .role-info {
      text-align: left;
      flex: 1;
    }
    
    .role-title {
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--primary-brand);
      margin-bottom: 4px;
      display: block;
    }
    
    .role-desc {
      font-size: 0.8rem;
      color: var(--muted-text);
      display: block;
    }
    
    .role-arrow {
      color: var(--primary-brand);
      opacity: 0.5;
      transition: opacity 0.2s ease;
    }
    
    .role-option:hover .role-arrow {
      opacity: 1;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <header id="navbar-header">
    <div class="container">
      <div class="nav-inner">
        <!-- Brand Logo -->
        <a href="index.html" class="brand-logo-panel">
          <div style="background: var(--primary-brand); border-radius: 6px; width: 42px; height: 42px; display: flex; align-items: center; justify-content: center;">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
          </div>
          <div style="display: flex; flex-direction: column;">
            <span style="font-family: var(--font-serif); font-size: 1.6rem; color: var(--primary-brand); font-weight: 800; line-height: 1;">CityCare</span>
            <span style="font-size: 0.75rem; letter-spacing: 0.2em; color: var(--muted-text); font-weight: 500; text-transform: uppercase;">Hospital</span>
          </div>
        </a>
        
        <div>
          <a href="index.html" style="color: var(--muted-text); text-decoration: none; font-weight: 600; font-size: 0.95rem;">← Back to Home</a>
        </div>
      </div>
    </div>
  </header>

  <!-- Role Selection -->
  <main class="selection-container">
    <div class="filter-card">
      <div style="width: 64px; height: 64px; background: var(--primary-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px auto;">
        <svg viewBox="0 0 24 24" width="32" height="32" stroke="var(--primary-brand)" stroke-width="2" fill="none"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
      </div>
      
      <h1 class="filter-card-title">Select Your Role</h1>
      <p class="filter-card-subtitle">Choose your account type to proceed to the secure CityCare login portal.</p>
      
      <div class="role-list">
        <!-- Patient Option -->
        <a href="features/auth/login.html?role=Patient" class="role-option">
          <div class="role-icon">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="var(--primary-brand)" stroke-width="2" fill="none"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
          </div>
          <div class="role-info">
            <span class="role-title">Patient</span>
            <span class="role-desc">Book appointments & view records</span>
          </div>
          <div class="role-arrow">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
          </div>
        </a>
        
        <!-- Doctor Option -->
        <a href="features/auth/login.html?role=Doctor" class="role-option">
          <div class="role-icon">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="var(--primary-brand)" stroke-width="2" fill="none"><path d="M22 12h-4l-3 9L9 3l-3 9H2"></path></svg>
          </div>
          <div class="role-info">
            <span class="role-title">Doctor</span>
            <span class="role-desc">Manage schedule & patients</span>
          </div>
          <div class="role-arrow">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
          </div>
        </a>
        
        <!-- Administrator Option -->
        <a href="features/auth/login.html?role=Admin" class="role-option">
          <div class="role-icon">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="var(--primary-brand)" stroke-width="2" fill="none"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
          </div>
          <div class="role-info">
            <span class="role-title">Administrator</span>
            <span class="role-desc">Oversee hospital operations</span>
          </div>
          <div class="role-arrow">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
          </div>
        </a>
      </div>
    </div>
  </main>

</body>
</html>
